version: 2

before:
  hooks:
    - npm run build --prefix ui

builds:
  - binary: "{{ .ProjectName }}"
    ldflags:
      - -s -w
      - -X github.com/your-org/go-app-template/internal/version.Version={{ .Version }}
      - -X github.com/your-org/go-app-template/internal/version.Commit={{ .Commit }}
      - -X github.com/your-org/go-app-template/internal/version.BuildDate={{ .Date }}
    goos:
      - linux
      - darwin
      - windows
    goarch:
      - amd64
      - arm64
    ignore:
      - goos: windows
        goarch: arm64

archives:
  - formats: [tar.gz]
    format_overrides:
      - goos: windows
        formats: [zip]
    name_template: "{{ .ProjectName }}_{{ .Version }}_{{ .Os }}_{{ .Arch }}"

checksum:
  name_template: checksums.txt

changelog:
  sort: asc
  filters:
    exclude:
      - "^docs:"
      - "^test:"
      - "^chore:"
