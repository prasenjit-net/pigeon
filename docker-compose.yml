services:
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: pigeon
      POSTGRES_PASSWORD: pigeon
      POSTGRES_DB: pigeon
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U pigeon -d pigeon"]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  pgdata:
